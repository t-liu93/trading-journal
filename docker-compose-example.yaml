services:
  postgres:
    # This example is intended for local development.
    # In production, remove the host port mapping and keep Postgres reachable only
    # from other services on the Compose network.
    container_name: trading-journal-db
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_journal}
      POSTGRES_USER: ${POSTGRES_USER:-trading_journal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trading-journal-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  trading-journal-postgres-data:
